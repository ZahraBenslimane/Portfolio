- degree: Ph.D. Student
  Institution: CEA-LIST, Embedded AI Laboratory
  location: France
  period: Current
  # focus:
  #   - Multichannel Speech enhancement
  #   - Binaural audio
  #   - Model compression
  #   - Efficient inference
  #   - Hearing-assistance systems
  summary: >
    Doctoral research on neural networks for improving speech understanding in
    real-time embedded systems. The project targets low-latency, low-computational-cost
    binaural and multi-microphone speech enhancement for resource-constrained
    hearing-assistance devices.
  details:
    - title: Ph.D. project
      items:
        - Developing and evaluating neural speech-enhancement models for real-time audio processing.
        - Working with binaural and multi-microphone signals to improve speech understanding in noisy environments.
        - Studying model compression, quantization, and efficient inference for embedded hearing-assistance devices.
        - Designing reproducible experiments that connect speech quality, intelligibility, latency, model size, and computational cost.

- degree: M.Sc. in Smart Systems Engineering
  institution: Sorbonne University
  location: Paris, France
  period: 2021-2023
  #focus:
  #  - Machine learning and deep learning
  #  - Computer vision
  #  - Audio signal processing
  summary: >
    A multidisciplinary program combining artificial intelligence, signal processing, computer vision, robotics, and embedded systems.
  details:
    - title: Machine learning and deep learning
      items:
        - TensorFlow, PyTorch, Keras, pandas, and scikit-learn.
        - MLPs, CNNs, RNNs, autoencoders, and GANs.
        - Neural network compression methods including folding, pruning, and quantization.
    - title: Image processing and computer vision
      items:
        - Image stitching, blob detection, regions of interest, and feature-based image analysis.
        - Motion detection and estimation with block matching, Lucas-Kanade, and Horn-Schunck.
        - Object tracking with Kalman and particle filters.
        - Real-time image processing on Nvidia Jetson Nano with OpenCV, Pillow, and scikit-image.
    - title: Audio signal processing
      items:
        - Time-frequency analysis and audio compression.
        - Beamforming and Time Delay of Arrival estimation for sound source localization.
        - Audio source separation with Non-negative Matrix Factorization.

- degree: B.Sc. in Electronics, Electrical Engineering, and Automatics
  institution: Sorbonne University
  location: Paris, France
  period: 2019-2021
  summary: >
    Undergraduate curriculum providing a broad theoretical and practical
    foundation in analog and digital electronics, embedded systems, signal processing,
    automatic control, electromagnetism, electrical energy, and numerical methods.
  details:
  
    - title: Analog and digital electronics
      items:
        - Designed and analyzed analog and digital circuits involving op-amps, diodes, filters, sensors, and analog-digital interfaces.
        - Studied semiconductors, integrated circuits, Boolean algebra, combinational logic, and sequential systems.
        - Used PSpice and LTspice for circuit modeling, analysis, and simulation.
        - Designed printed circuit boards and hardware prototypes using Eagle.
    - title: Digital and embedded systems
      items:
        - Designed FPGA-based systems in VHDL, including finite-state machines, memories, arithmetic components, and processor-oriented architectures.
        - Performed simulation, synthesis, and hardware validation using Xilinx Vivado and ModelSim.
        - Programmed microcontrollers in C and C++, working with interrupts, timers, memory, peripherals, and communication interfaces.
        - Used Keil uVision for embedded software development and debugging.
    - title: Image and audio signal processing
      items:
        - Studied complete image and audio acquisition chains, from cameras and microphones to digital processing and signal reproduction.
        - Applied image-processing techniques including grayscale and color representation, histograms, contrast enhancement, denoising, edge detection, and mathematical morphology.
        - Studied optical systems, CCD and CMOS sensors, image formation, acquisition parameters, and sensor noise.
        - Explored acoustics and psychoacoustics, microphone characteristics, sampling, quantization, aliasing, and signal-to-noise ratio.
        - Applied Fourier analysis, spectrograms, digital filtering, and audio effects using MATLAB and Simulink.
        - Developed a real-time audio acquisition, processing, and reproduction pipeline.
    - title: Electromagnetism and electrical systems
      items:
        - Covered electrostatics, magnetism, electromagnetic propagation, wave behavior, and antenna radiation.
        - Studied electrical energy sources, actuators, sensors, and electromechanical systems.
        - Used 4NEC2 for antenna modeling and electromagnetic analysis.
    - title: Numerical methods and engineering practice
      items:
        - Applied numerical methods with MATLAB and Python to solve engineering and physical-system problems.
        - Used oscilloscopes, multimeters, signal generators, and AC/DC power supplies for circuit testing and characterization.
        - Developed practical skills in soldering, wiring, prototyping, debugging, and technical documentation.
        - Completed hands-on electronic projects involving specification, modeling, simulation, implementation, and experimental validation.